name: Release Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [ dev, prod ]
      branch:
        description: Branch to deploy
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  SERVICE_NAME: digi-identity
  AWS_REGION: us-east-1
  K8S_NAMESPACE: cape-digi
  TF_BACKEND_BUCKET: cape-digi-tf-state
  TF_BACKEND_LOCK_TABLE: cape-digi-tf-locks
  TF_STATE_KEY_PREFIX: digi-identity
  KUBECONFIG: /home/runner/.kube/config

  APP_ECR_REPO_NAME: cape-digi-digi-identity
  SSM_LOADER_ECR_REPO_NAME: cape-digi-ssm-loader

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.11.4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        env:
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin \
              "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"

      - name: Build and push Keycloak image
        env:
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          APP_IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${APP_ECR_REPO_NAME}:${GITHUB_SHA}"

          docker build -t "$APP_IMAGE_URI" .
          docker push "$APP_IMAGE_URI"

          echo "APP_IMAGE_URI=$APP_IMAGE_URI" >> "$GITHUB_ENV"
          echo "APP_IMAGE_REPOSITORY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${APP_ECR_REPO_NAME}" >> "$GITHUB_ENV"
          echo "APP_IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Build and push SSM loader image
        env:
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          SSM_LOADER_IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${SSM_LOADER_ECR_REPO_NAME}:${GITHUB_SHA}"

          docker build -t "$SSM_LOADER_IMAGE_URI" ./ssm-loader
          docker push "$SSM_LOADER_IMAGE_URI"

          echo "SSM_LOADER_IMAGE_URI=$SSM_LOADER_IMAGE_URI" >> "$GITHUB_ENV"
          echo "SSM_LOADER_IMAGE_REPOSITORY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${SSM_LOADER_ECR_REPO_NAME}" >> "$GITHUB_ENV"
          echo "SSM_LOADER_IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Update kubeconfig
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$KUBECONFIG")"

          aws eks update-kubeconfig \
            --name "${{ vars.EKS_CLUSTER_NAME }}" \
            --region "$AWS_REGION"

          kubectl config current-context
          kubectl get ns

      - name: Inspect Terraform outputs
        working-directory: infrastructure/terraform
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=$TF_BACKEND_BUCKET" \
            -backend-config="key=$TF_STATE_KEY_PREFIX/${{ inputs.environment }}/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=$TF_BACKEND_LOCK_TABLE" \
            -backend-config="encrypt=true"
          terraform output -json || true

      - name: Deploy with Helm
        working-directory: infrastructure
        env:
          IRSA_ROLE_ARN: ${{ secrets.IRSA_ROLE_ARN }}
          ACM_CERT_ARN: ${{ secrets.ACM_CERT_ARN }}
        run: |
          set -euo pipefail

          helm upgrade --install "$SERVICE_NAME" k8s/helm \
            -f "k8s/helm/values.${{ inputs.environment }}.yaml" \
            --namespace "$K8S_NAMESPACE" \
            --create-namespace \
            --set image.repository="$APP_IMAGE_REPOSITORY" \
            --set image.tag="$APP_IMAGE_TAG" \
            --set ssmLoaderImage.repository="$SSM_LOADER_IMAGE_REPOSITORY" \
            --set ssmLoaderImage.tag="$SSM_LOADER_IMAGE_TAG" \
            --set serviceAccount.roleArn="$IRSA_ROLE_ARN"
            # --set ingress.certificateArn="$ACM_CERT_ARN"

      - name: Verify deployment
        run: |
          set -euo pipefail
          kubectl -n "$K8S_NAMESPACE" get deploy,po,svc
          kubectl -n "$K8S_NAMESPACE" rollout status deploy/"$SERVICE_NAME" --timeout=300s
