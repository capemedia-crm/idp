apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.roleArn | quote }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  labels:
    app: {{ .Values.name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      volumes:
        - name: tmp
          emptyDir: {}
        - name: ssm-env
          emptyDir: {}

      initContainers:
        - name: ssm-loader
          image: "{{ .Values.ssmLoaderImage.repository }}:{{ .Values.ssmLoaderImage.tag }}"
          imagePullPolicy: {{ .Values.ssmLoaderImage.pullPolicy }}
          env:
            - name: AWS_REGION
              value: {{ .Values.awsRegion | quote }}
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.awsRegion | quote }}
            - name: SSM_PARAMETER_PREFIX
              value: {{ .Values.ssmPrefix | quote }}
            - name: OUTPUT_FILE
              value: /work/keycloak.env
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: ssm-env
              mountPath: /work

      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              . /work/keycloak.env
              exec /opt/keycloak/bin/kc.sh start
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: AWS_REGION
              value: {{ .Values.awsRegion | quote }}
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.awsRegion | quote }}
            - name: ENV
              value: "prod"
            - name: SSM_PARAMETER_PREFIX
              value: {{ .Values.ssmPrefix | quote }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: ssm-env
              mountPath: /work
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 0
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{ toYaml .Values.resources | nindent 12 }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}
spec:
  selector:
    app: {{ .Values.name }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.name }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.averageCpuUtilization }}

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Values.name }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      app: {{ .Values.name }}

