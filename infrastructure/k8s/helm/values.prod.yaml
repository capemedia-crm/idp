name: digi-identity

image:
  repository: 565393046261.dkr.ecr.us-east-1.amazonaws.com/cape-digi-digi-identity
  tag: latest
  pullPolicy: IfNotPresent

ssmLoaderImage:
  repository: 565393046261.dkr.ecr.us-east-1.amazonaws.com/cape-digi-ssm-loader
  tag: latest
  pullPolicy: IfNotPresent

replicas: 2

awsRegion: us-east-1
ssmPrefix: /digi-identity/prod

serviceAccount:
  name: digi-identity
  roleArn: ""

service:
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

autoscaling:
  minReplicas: 2
  maxReplicas: 5
  averageCpuUtilization: 70

pdb:
  minAvailable: 1

# JVM tuning — must stay proportional to resources.limits.memory above
# Xms/Xmx at ~50% of the memory limit leaves headroom for metaspace + native
javaOptsAppend: "-Xms512m -Xmx1g"

# emptyDir for /opt/keycloak/data — Keycloak is stateless with external Postgres;
# this directory only holds H2 scratch files and Infinispan cache
keycloakData:
  sizeLimit: 500Mi